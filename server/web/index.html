<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop & Deploy — 上传即部署</title>
    <meta name="description" content="拖入一个 HTML 文件或 zip 压缩包，立即部署成可访问的静态站点。">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <link rel="stylesheet" href="css/app.css">
</head>

<body>
    <div class="page">
        <header class="topbar">
            <span class="brand">🚀 Drop &amp; Deploy</span>
            <button id="token-btn" class="ghost-btn" title="设置上传 Token">🔑 Token</button>
        </header>

        <section class="hero">
            <h1>拖进来，就部署。</h1>
            <p>把一个 <code>.html</code> 文件或 <code>.zip</code> 压缩包拖到下面，立即得到一个可访问的链接。</p>
        </section>

        <!-- 上传区 -->
        <section class="dropzone" id="dropzone">
            <input type="file" id="file-input" accept=".html,.htm,.zip" hidden>
            <div class="dz-inner">
                <div class="dz-icon">📦</div>
                <p class="dz-title">拖放文件到这里，或<button class="link-btn" id="browse-btn">点击选择</button></p>
                <p class="dz-hint">支持 .html / .htm / .zip（zip 根目录需含 index.html）</p>
            </div>
        </section>

        <!-- 上传选项 -->
        <section class="options">
            <label class="field">
                <span>站点名（可选）</span>
                <input type="text" id="name-input" placeholder="留空则按文件名自动命名" autocomplete="off">
            </label>
            <label class="check">
                <input type="checkbox" id="overwrite-input">
                <span>同名时覆盖</span>
            </label>
        </section>

        <!-- 结果 / 进度 -->
        <div id="result" class="result" hidden></div>

        <!-- 站点列表 -->
        <section class="sites">
            <div class="sites-head">
                <h2>已部署站点</h2>
                <button id="refresh-btn" class="ghost-btn">刷新</button>
            </div>
            <div id="site-list" class="site-list"></div>
        </section>
    </div>

    <script src="js/sites.js"></script>
    <script src="js/upload.js"></script>
</body>

</html>
