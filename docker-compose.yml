services:
  deployer:
    build: ./server
    container_name: static-deployer
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      # 可写：上传的站点与元数据落在这里
      - ./data:/data
    environment:
      # 上传/管理接口的 Bearer Token（必填，私有部署的唯一凭证）
      - DEPLOY_TOKEN=${DEPLOY_TOKEN:?请在 .env 中设置 DEPLOY_TOKEN}
      # 监听端口（非 root 运行，需非特权端口）
      - LISTEN=:8080
      # 数据根目录
      - DATA_DIR=/data
      # 单次上传体积上限（MB）
      - MAX_UPLOAD_MB=50
      # zip 解压后总大小上限（MB），防 zip bomb
      - MAX_UNZIP_MB=200
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true
