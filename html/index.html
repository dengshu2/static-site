<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Library — 工具提示词库</title>
    <meta name="description" content="用大模型创作实用工具的提示词集合。复制提示词，直接喂给 Claude、GPT 或 Gemini，即可复现同类工具。">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <a href="#main-content" class="skip-link">跳转到主内容</a>

    <div class="page">

        <!-- Header -->
        <header>
            <div class="header-bar">
                <span class="site-name">Prompt Library</span>
                <a href="https://github.com/dengshu2/static-site" target="_blank" rel="noopener"
                    class="header-link">GitHub →</a>
            </div>
        </header>

        <!-- Intro -->
        <section class="intro">
            <h1>用提示词复现工具，<br>而不是从零开发。</h1>
            <p>这里收录了每个工具的生成提示词。复制一段，粘贴给 Claude、GPT 或 Gemini，你就能得到同类工具的完整代码。</p>
        </section>

        <!-- Tool List — 由 app.js 动态渲染 -->
        <main id="main-content">
            <div class="tool-list" role="list" id="tool-list"></div>
        </main>

        <!-- Footer -->
        <footer>
            <div class="footer-inner">
                <p class="footer-copy">© 2026 Static Apps</p>
                <nav class="footer-links" aria-label="页脚导航">
                    <a href="https://github.com/dengshu2/static-site" target="_blank" rel="noopener">GitHub</a>
                    <a href="https://github.com/dengshu2/static-site/blob/main/README.md" target="_blank"
                        rel="noopener">使用说明</a>
                    <a href="https://github.com/dengshu2/static-site/issues" target="_blank" rel="noopener">提交问题</a>
                </nav>
            </div>
        </footer>

    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
